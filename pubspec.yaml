name: mecavoltia_society_app
description: "App de administración de Mecavoltia: portafolio y perfiles de los socios."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Estado y DI (rules.md §2: decisión cerrada)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Modelos inmutables y serialización
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP con interceptores (auth + refresh automático)
  dio: ^5.7.0

  # Navegación declarativa con guards de sesión
  go_router: ^14.6.2

  # Tokens en Keychain/Keystore — jamás SharedPreferences (rules.md §4)
  flutter_secure_storage: ^9.2.2

  # Selección de imágenes (trabajos, foto de perfil) y PDF (CV)
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Lints estrictos (rules.md §3)
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
